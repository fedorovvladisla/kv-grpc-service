syntax = "proto3";

package com.example.kv;

service KVService {
  rpc Put (KeyValue) returns (Empty);
  rpc Get (Key) returns (Value);
  rpc Delete (Key) returns (Empty);
  rpc Range (RangeRequest) returns (stream KeyValue);
  rpc Count (Empty) returns (CountResponse);
}

message KeyValue {
  string key = 1;
  bytes value = 2;
}

message Key {
  string key = 1;
}

message Value {
  bytes value = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
}

message CountResponse {
  int64 count = 1;
}

message Empty {}